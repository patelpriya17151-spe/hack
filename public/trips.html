<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FleetFlow - Trips</title>
  <style>
    :root { --bg:#070b1a; --card:rgba(255,255,255,0.08); --blue:#1ea7ff; --green:#39ff88; --text:#eaf7ff; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:Arial,sans-serif; color:var(--text); background:radial-gradient(circle at top, #0f1e44, var(--bg)); min-height:100vh; display:flex; flex-direction:column; }
    nav { display:flex; gap:16px; padding:16px 20px; background:rgba(0,0,0,0.3); backdrop-filter:blur(6px); flex-wrap:wrap; }
    nav a { color:var(--blue); text-decoration:none; font-weight:bold; }
    nav a:hover { color:var(--green); }
    .container { max-width:1040px; margin:26px auto; padding:0 16px; width:100%; }
    .card { background:var(--card); border:1px solid rgba(255,255,255,0.2); border-radius:18px; padding:24px; backdrop-filter:blur(12px); box-shadow:0 0 28px rgba(30,167,255,0.15); margin-bottom:18px; }
    h1,h2 { margin-top:0; color:var(--green); }
    label { display:block; margin:14px 0 8px; }
    input, button { width:100%; padding:12px; border-radius:10px; border:none; }
    input { background:rgba(255,255,255,0.12); color:white; }
    button { margin-top:16px; background:linear-gradient(90deg,var(--blue),var(--green)); font-weight:bold; cursor:pointer; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    #result { margin-top:14px; color:var(--green); }
    table { width:100%; border-collapse:collapse; font-size:14px; }
    th, td { padding:10px; border-bottom:1px solid rgba(255,255,255,0.2); text-align:left; }
    th { color:var(--blue); }
    .tiny-btn { padding:8px 10px; width:auto; margin:0; }
    footer { margin-top:auto; text-align:center; padding:16px; color:#9fc4ff; }
    @media (max-width:700px){ .grid{ grid-template-columns:1fr; } }
  </style>
</head>
<body onload="loadTrips()">
  <nav>
    <a href="/dashboard.html">Dashboard</a>
    <a href="/vehicles.html">Vehicles</a>
    <a href="/drivers.html">Drivers</a>
    <a href="/trips.html">Trips</a>
  </nav>
  <main class="container">
    <section class="card">
      <h1>Create Trip</h1>
      <div class="grid">
        <div>
          <label for="vehicle_id">Vehicle ID</label>
          <input id="vehicle_id" type="number" placeholder="e.g., 1" />
        </div>
        <div>
          <label for="driver_id">Driver ID</label>
          <input id="driver_id" type="number" placeholder="e.g., 1" />
        </div>
        <div>
          <label for="cargo_weight">Cargo Weight (kg)</label>
          <input id="cargo_weight" type="number" placeholder="e.g., 350" />
        </div>
        <div>
          <label for="fuel_cost">Fuel Cost</label>
          <input id="fuel_cost" type="number" placeholder="e.g., 120" />
        </div>
      </div>
      <label for="maintenance_cost">Maintenance Cost</label>
      <input id="maintenance_cost" type="number" placeholder="e.g., 40" />
      <button onclick="createTrip()">Create Trip</button>
      <p id="result"></p>
    </section>

    <section class="card">
      <h2>All Trips</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th><th>Vehicle</th><th>Driver</th><th>Cargo</th><th>Fuel</th><th>Maint.</th><th>Operational</th><th>Status</th><th>Action</th>
          </tr>
        </thead>
        <tbody id="tripRows"></tbody>
      </table>
    </section>
  </main>
  <footer>Hackathon MVP - FleetFlow</footer>

  <script>
    function createTrip(){ fetch('/createTrip', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        vehicle_id:Number(document.getElementById('vehicle_id').value),
        driver_id:Number(document.getElementById('driver_id').value),
        cargo_weight:Number(document.getElementById('cargo_weight').value),
        fuel_cost:Number(document.getElementById('fuel_cost').value || 0),
        maintenance_cost:Number(document.getElementById('maintenance_cost').value || 0)
      })
    })
      .then(res => res.json())
      .then(data => { document.getElementById('result').textContent = data.message; loadTrips(); })
      .catch(() => document.getElementById('result').textContent = 'Request failed');
    }

    function completeTrip(tripId){
      fetch('/completeTrip', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ trip_id: tripId })
      })
        .then(res => res.json())
        .then(data => { document.getElementById('result').textContent = data.message; loadTrips(); });
    }

    function loadTrips(){
      fetch('/trips')
        .then(res => res.json())
        .then(data => {
          document.getElementById('tripRows').innerHTML = data.map(t =>
            `<tr>
              <td>${t.id}</td>
              <td>${t.vehicle_name || t.vehicle_id}</td>
              <td>${t.driver_name || t.driver_id}</td>
              <td>${t.cargo_weight}</td>
              <td>${t.fuel_cost}</td>
              <td>${t.maintenance_cost}</td>
              <td>${t.operational_cost}</td>
              <td>${t.status}</td>
              <td>${t.status === 'In Progress' ? `<button class='tiny-btn' onclick='completeTrip(${t.id})'>Complete</button>` : '-'}</td>
            </tr>`
          ).join('');
        });
    }
  </script>
</body>
</html>
