<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FleetFlow - Dashboard</title>
  <style>
    :root { --bg:#070b1a; --card:rgba(255,255,255,0.08); --blue:#1ea7ff; --green:#39ff88; --text:#eaf7ff; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial,sans-serif; color:var(--text); background:radial-gradient(circle at top, #0f1e44, var(--bg)); min-height:100vh; display:flex; flex-direction:column; }
    nav { display:flex; gap:16px; padding:16px 20px; background:rgba(0,0,0,0.3); backdrop-filter:blur(6px); flex-wrap:wrap; }
    nav a { color:var(--blue); text-decoration:none; font-weight:bold; }
    nav a:hover { color:var(--green); }
    .container { max-width:1000px; margin:26px auto; width:100%; padding:0 16px; }
    h1 { color:var(--green); }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:16px; }
    .card { background:var(--card); border:1px solid rgba(255,255,255,0.2); border-radius:16px; padding:20px; backdrop-filter:blur(12px); box-shadow:0 0 28px rgba(30,167,255,0.15); }
    .label { color:#9fc4ff; font-size:14px; }
    .value { font-size:32px; margin-top:8px; color:var(--green); font-weight:bold; }
    footer { margin-top:auto; text-align:center; padding:16px; color:#9fc4ff; }
  </style>
</head>
<body onload="loadDashboard()">
  <nav>
    <a href="/dashboard.html">Dashboard</a>
    <a href="/vehicles.html">Vehicles</a>
    <a href="/drivers.html">Drivers</a>
    <a href="/trips.html">Trips</a>
  </nav>

  <main class="container">
    <h1>Fleet Overview</h1>
    <div class="grid">
      <div class="card"><div class="label">Total Vehicles</div><div class="value" id="totalVehicles">0</div></div>
      <div class="card"><div class="label">Total Drivers</div><div class="value" id="totalDrivers">0</div></div>
      <div class="card"><div class="label">Total Trips</div><div class="value" id="totalTrips">0</div></div>
      <div class="card"><div class="label">Vehicles In Use</div><div class="value" id="vehiclesInUse">0</div></div>
      <div class="card"><div class="label">Vehicles Available</div><div class="value" id="vehiclesAvailable">0</div></div>
    </div>
  </main>

  <footer>Hackathon MVP - FleetFlow</footer>

  <script>
    function loadDashboard(){
      fetch('/dashboardStats')
        .then(res => res.json())
        .then(data => {
          document.getElementById('totalVehicles').textContent = data.totalVehicles || 0;
          document.getElementById('totalDrivers').textContent = data.totalDrivers || 0;
          document.getElementById('totalTrips').textContent = data.totalTrips || 0;
          document.getElementById('vehiclesInUse').textContent = data.vehiclesInUse || 0;
          document.getElementById('vehiclesAvailable').textContent = data.vehiclesAvailable || 0;
        });
    }
  </script>
</body>
</html>
